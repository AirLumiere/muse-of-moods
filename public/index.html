    function displayArtist(artwork) {
      const raw = String(artwork.artist || "佚名").trim();
      if (ARTIST_ZH[raw]) return ARTIST_ZH[raw];
      const cleaned = raw.replace(/\s*\\([^)]*\\)/g, "").replace(/,.*$/, "").trim();
      return ARTIST_ZH[cleaned] || cleaned || "佚名";
    }

    function authorProfile(artwork) {
      const raw = String(artwork.artist || "").trim();
      const cleaned = raw.replace(/\s*\\([^)]*\\)/g, "").replace(/,.*$/, "").trim();
      const profile = AUTHOR_PROFILES[raw] || AUTHOR_PROFILES[cleaned];
      const name = displayArtist(artwork);
      return {
        name,
        avatar: authorAvatar(name),
        avatarImage: authorImage(raw, cleaned),
        years: profile?.years || "馆藏艺术家",
        bio: profile?.bio || `${name}的资料在当前馆藏里并不完整。可以先从这张作品的题材、年代和情绪关系进入：看它如何把个人经验、时代审美和观看者的心情连接起来。`
      };
    }

    function authorImage(raw, cleaned) {
      if (raw === "Vincent van Gogh" || cleaned === "Vincent van Gogh") return "art-nebula-assets/images/met-436532.jpg";
      return "";
    }

    function authorAvatar(name) {
      const clean = String(name || "艺").replace(/[·\s-]/g, "");
      return clean.slice(0, 2) || "艺";
    }

    function displayTitle(artwork) {
      const raw = String(artwork.title || "未命名").trim();
      if (TITLE_ZH[raw]) return TITLE_ZH[raw];
      if (/Hokusai|Katsushika/i.test(artwork.artist || "") && /wave|kanagawa/i.test(raw)) return "神奈川冲浪里";
      const fallback = localizedTitleFallback(raw);
      if (fallback) return fallback;
      let short = raw
        .replace(/\s*\\([^)]*\\)/g, "")
        .replace(/^The\\s+/i, "")
        .split(/[:;，,]/)[0]
        .trim();
      if (short.length > 34) short = `${short.slice(0, 31)}...`;
      return short || raw;
    }

    function localizedTitleFallback(raw) {
      const clean = String(raw || "").replace(/\s*\\([^)]*\\)/g, "").trim();
      if (/^Portrait of a Young Woman/i.test(clean)) return "年轻女子肖像";
      if (/^Portrait of a Young Man/i.test(clean)) return "青年男子肖像";
      if (/^Portrait of a Woman/i.test(clean)) return "女子肖像";
      if (/^Portrait of a Man/i.test(clean)) return "男子肖像";
      if (/^Still Life with/i.test(clean)) return `${clean.replace(/^Still Life with\\s+/i, "").split(/,|and/i)[0].trim()}静物`;
      if (/^Madonna and Child/i.test(clean)) return "圣母子";
      if (/^The\\s+/.test(clean)) return clean.replace(/^The\\s+/i, "");
      return "";
    }

    function profileFor(artwork) {
      if (artwork.atmosphere && artwork.story && artwork.guide) {
        return { atmosphere: artwork.atmosphere, story: artwork.story, guide: artwork.guide };
      }
      const [first, second, third] = artwork.moods.map(mood => emotionMap[mood.id]);
      const title = displayTitle(artwork);
      const artist = displayArtist(artwork);
      return {
        atmosphere: `${title}的主调是${first.label}，${second.label}和${third.label}像两层暗光叠在外面；它适合表达一种不止一种答案的心情。`,
        story: `${artist}把${artwork.date || "某个时代"}的视觉经验留在画面里。看这件作品时，可以把它放回${artwork.movement || "它所属的艺术语境"}里，观察时代审美怎样变成私人感受。`,
        guide: guideForArtwork(artwork)
      };
    }

    function guideForArtwork(artwork) {
      const title = displayTitle(artwork);
      const rawTitle = String(artwork.title || title).toLowerCase();
      const artist = displayArtist(artwork);
      const rawArtist = String(artwork.artist || artist).toLowerCase();
      const subject = `${rawTitle} ${title}`.toLowerCase();
      const artistNote = artistGuideNote(rawArtist, artist);

      if (/starry|星夜|night|moon|asylum|corridor|夜|疗养院|走廊/.test(subject)) {
        return `看《${title}》时先不要急着找故事，先沿着光源和暗部移动视线：夜色、窗、道路或旋涡会把情绪带向画面深处。${artistNote}`;
      }
      if (/self-portrait|portrait|肖像|小姐|夫人|男子|女子|青年|少女|prince|chancellor|abbot|murer|durieux|roulin|ginoux/.test(subject)) {
        return `看《${title}》可以先从脸部和手势进入，再退一步看衣物、椅背、背景怎样围住人物。肖像真正好看的地方，往往是“被观看的人”如何反过来看我们。${artistNote}`;
      }
      if (/madonna|child|baby|mother|family|children|圣母|圣婴|孩子|母|baby|roulin/.test(subject)) {
        return `看《${title}》时先观察人物之间的距离：手臂、视线和身体倾斜会说明亲密关系的温度。再看背景是否安静，它常常决定这份温柔是日常的，还是带有仪式感的。${artistNote}`;
      }
      if (/flower|flowers|iris|irises|sunflowers|oleanders|chrysanthemums|orchard|blossoms|vase|花|鸢尾|向日葵|果园|花瓶/.test(subject)) {
        return `看《${title}》时先看花朵的方向和疏密，再看颜色之间是互相推开还是互相靠近。花卉题材不只是“漂亮”，它常把生命力、脆弱和时间感压在同一个色面里。${artistNote}`;
      }
      if (/still life|apples|peaches|grapes|lobster|fruit|静物|苹果|葡萄|水果|龙虾/.test(subject)) {
        return `看《${title}》时先找桌面边缘、器物轮廓和阴影的关系。静物的重点不在物品本身，而在画家如何用重量、光泽和摆放秩序，让普通物件显出性格。${artistNote}`;
      }
      if (/landscape|field|wheat|cypresses|road|forest|winter|sunset|ravine|river|water|garden|tree|olive|haystacks|风景|森林|麦田|橄榄|峡谷|花园|道路/.test(subject)) {
        return `看《${title}》时先找地平线、道路或树木形成的视线通道，再观察天空和地面的明暗比例。风景画最值得看的，是自然如何变成一种心理空间。${artistNote}`;
      }
      if (/sea|seashore|wave|harbor|port|boating|cliff|skating|海|浪|港|船|悬崖|滑冰/.test(subject)) {
        return `看《${title}》时先顺着水面、浪线或船只的方向移动视线，再看人物和自然的比例。海景与水面题材最有力量的地方，是它把自由、危险和呼吸感放在同一个节奏里。${artistNote}`;
      }
      if (/dancer|dance|dancing|ballet|music|piano|舞|芭蕾|钢琴|音乐/.test(subject)) {
        return `看《${title}》时先看身体重心：脚尖、手臂和衣裙边缘会暴露动作正在发生还是刚刚结束。舞蹈题材的专业入口，是看画面如何把时间切成一个瞬间。${artistNote}`;
      }
      if (/annunciation|trinity|apostle|saint|saints|christ|angel|altar|temple|madonna|圣|天使|祭坛|基督|三位一体/.test(subject)) {
        return `看《${title}》时先看光从哪里来，再看人物之间的手势和视线如何构成三角关系。宗教题材不要只看故事，要看画面如何用秩序、光和空白制造神圣感。${artistNote}`;
      }
      if (/judith|death|socrates|joan|betrayal|moses|striking|lamentation|battle|war|temptation|犹滴|死亡|背叛|圣女贞德|摩西/.test(subject)) {
        return `看《${title}》时先找最关键的手势或武器，再看周围人物的身体方向。叙事画的张力通常不在“发生了什么”，而在每个人对那个瞬间的反应差异。${artistNote}`;
      }
      if (/nude|bathing|cupid|diana|angelica|medoro|seated|reclining|裸|沐浴|丘比特|狄安娜/.test(subject)) {
        return `看《${title}》时先看身体轮廓和光线停留的位置，再看背景是否把人物推近或拉远。这个题材的观看重点，是欲望、距离和观看礼仪之间的微妙边界。${artistNote}`;
      }
      if (/room|project|gate|porte|pirna|architecture|design|房间|城门|建筑|设计/.test(subject)) {
        return `看《${title}》时先找透视线和入口位置，再看装饰细节如何引导视线。建筑与室内题材的重点，是空间如何暗示权力、记忆或某种等待。${artistNote}`;
      }
      return `看《${title}》时可以先选一个最吸引你的局部：一块亮色、一条轮廓或一个动作，再追踪它如何牵动整张画。好的入口不是“看懂”，而是找到画面最先抓住你的那条线。${artistNote}`;
    }

    function artistGuideNote(rawArtist, artist) {
      if (/van gogh/.test(rawArtist)) return " 特别留意笔触的方向：梵高常用线条本身制造情绪速度。";
      if (/monet/.test(rawArtist)) return " 特别留意边缘如何被光融化：莫奈的重点常在空气，而不是物体轮廓。";
      if (/renoir/.test(rawArtist)) return " 特别留意暖色如何贴近皮肤和衣料，雷诺阿常把人物关系画成一种温度。";
      if (/degas/.test(rawArtist)) return " 特别留意裁切和视角，德加常让画面像被偶然截取，却暗中安排了节奏。";
      if (/cezanne|cézanne/.test(rawArtist)) return " 特别留意物体的体块关系，塞尚会把风景或静物稳定成一种结构。";
      if (/hokusai|katsushika/.test(rawArtist)) return " 特别留意轮廓线的节奏，北斋常把自然力量压缩成清晰而强烈的图形。";
      if (/rembrandt/.test(rawArtist)) return " 特别留意光从暗处托出人物的方式，伦勃朗的戏剧性常来自沉默。";
      if (/turner/.test(rawArtist)) return " 特别留意光、雾和水汽如何吞掉实体，透纳的画常像一场正在形成的天气。";
      if (/manet/.test(rawArtist)) return " 特别留意人物和背景之间的距离，马奈常让现代生活显出一点疏离。";
      return ` 如果不熟悉${artist}，就先从构图和光线进入，再回头看它对应的情绪标签。`;
    }

    function hasMood(artwork, emotionId) {
      return artwork.moods.some(mood => mood.id === emotionId);
    }

    function primaryMood(artwork) {
      return emotionMap[artwork.moods[0]?.id] || emotionMap.mystery;
    }

    function assignClusterSlots() {
      const groups = d3.group(artworks, artwork => artwork.moods[0]?.id || "mystery");
      for (const group of groups.values()) {
        group
          .sort((a, b) => (b.fame || 0) - (a.fame || 0))
          .forEach((artwork, index) => {
            artwork.clusterIndex = index;
            artwork.clusterTotal = group.length;
          });
      }
      [...artworks]
        .sort((a, b) => seeded(a.id + "spread") - seeded(b.id + "spread"))
        .forEach((artwork, index) => {
          artwork.globalIndex = index;
          artwork.globalTotal = artworks.length;
          artwork.emotionSlots = {};
        });
      EMOTIONS.forEach(emotion => {
        artworks
          .filter(artwork => hasMood(artwork, emotion.id))
          .sort((a, b) => {
            const aw = a.moods.find(mood => mood.id === emotion.id)?.weight || 0;
            const bw = b.moods.find(mood => mood.id === emotion.id)?.weight || 0;
            return bw - aw || seeded(a.id + emotion.id) - seeded(b.id + emotion.id);
          })
          .forEach((artwork, index, group) => {
            artwork.emotionSlots[emotion.id] = { index, total: group.length };
          });
        });
      assignOverviewPoints();
    }

    function artworkPoint(artwork) {
      return artwork.overviewPoint || overviewArtworkPoint(artwork);
    }

    function overviewArtworkPoint(artwork) {
      const primary = primaryMood(artwork);
      const semantic = moodAnchorPoint(artwork);
      const count = Math.max(1, artwork.globalTotal || artworks.length || 1);
      const index = artwork.globalIndex ?? artwork.clusterIndex ?? 0;
      const golden = Math.PI * (3 - Math.sqrt(5));
      const fractalDrift = Math.sin(index * .37 + seeded(primary.id + "arm") * 6.28) * .16
        + Math.sin(index * 1.13 + seeded(artwork.id + "arm") * 6.28) * .055;
      const angle = index * golden + seeded(artwork.id + primary.id + "angle") * .72 + fractalDrift;
      const radiusBase = Math.pow((index + .58) / (count + .58), .58);
      const radius = Math.max(.08, Math.min(1, radiusBase + Math.sin(index * .19) * .035 + (seeded(artwork.id + "r") - .5) * .05));
      const nebula = {
        x: graph.cx + Math.cos(angle) * graph.rx * 1.02 * radius,
        y: graph.cy + Math.sin(angle) * graph.ry * .98 * radius
      };
      const semanticPull = .3;
      const centerPull = .94;
      const semanticX = graph.cx + (semantic.x - graph.cx) * centerPull;
      const semanticY = graph.cy + (semantic.y - graph.cy) * centerPull;
      const jitterX = (seeded(artwork.id + "x") - .5) * 18;
      const jitterY = (seeded(artwork.id + "y") - .5) * 16;
      return {
        x: semanticX * semanticPull + nebula.x * (1 - semanticPull) + jitterX,
        y: semanticY * semanticPull + nebula.y * (1 - semanticPull) + jitterY
      };
    }

    function assignOverviewPoints() {
      const boundsX = graph.rx * 1.08;
      const boundsY = graph.ry * 1.06;
      const points = artworks.map(artwork => {
        const home = overviewArtworkPoint(artwork);
        return {
          artwork,
          x: home.x,
          y: home.y,
          homeX: home.x,
          homeY: home.y,
          radius: nodeRadius(artwork) + 5
        };
      });

      for (let iteration = 0; iteration < 56; iteration += 1) {
        for (let i = 0; i < points.length; i += 1) {
          for (let j = i + 1; j < points.length; j += 1) {
            const a = points[i];
            const b = points[j];
            let dx = b.x - a.x;
            let dy = b.y - a.y;
            let distance = Math.hypot(dx, dy);
            if (!distance) {
              const angle = seeded(a.artwork.id + b.artwork.id + "collision") * Math.PI * 2;
              dx = Math.cos(angle);
              dy = Math.sin(angle);
              distance = 1;
            }
            const minDistance = (a.radius + b.radius) * .78;
            if (distance >= minDistance) continue;
            const push = (minDistance - distance) * .5;
            const nx = dx / distance;
            const ny = dy / distance;
            a.x -= nx * push;
            a.y -= ny * push;
            b.x += nx * push;
            b.y += ny * push;
          }
        }

        points.forEach(point => {
          point.x += (point.homeX - point.x) * .022;
          point.y += (point.homeY - point.y) * .022;
          constrainPointToEllipse(point, boundsX, boundsY);
        });
      }

      points.forEach(point => {
        point.artwork.overviewPoint = { x: point.x, y: point.y };
      });
    }

    function constrainPointToEllipse(point, boundsX, boundsY) {
      const dx = point.x - graph.cx;
      const dy = point.y - graph.cy;
      const normalized = Math.hypot(dx / boundsX, dy / boundsY);
      if (normalized <= 1) return;
      const scale = .998 / normalized;
      point.x = graph.cx + dx * scale;
      point.y = graph.cy + dy * scale;
    }

    function moodAnchorPoint(artwork) {
      const moods = artwork.moods.slice(0, 3).filter(mood => emotionMap[mood.id]);
      if (!moods.length) return emotionPoint(emotionMap.mystery);
      const total = moods.reduce((sum, mood) => sum + mood.weight, 0) || 1;
      const weighted = moods.reduce((point, mood) => {
        const emotion = emotionMap[mood.id];
        const center = emotionPoint(emotion);
        const weight = mood.weight / total;
        point.x += center.x * weight;
        point.y += center.y * weight;
        return point;
      }, { x: 0, y: 0 });
      return weighted;
    }

    function focusedArtworkPoint(artwork, emotionId) {
      if (!emotionId || !hasMood(artwork, emotionId)) return artworkPoint(artwork);
      const emotion = emotionMap[emotionId];
      const center = emotionPoint(emotion);
      const slot = artwork.emotionSlots?.[emotionId] || { index: 0, total: 1 };
      const golden = Math.PI * (3 - Math.sqrt(5));
      const angle = slot.index * golden + seeded(artwork.id + emotionId + "focus") * .48;
      const radius = focusedFieldRadius(emotion) * (.13 + .7 * Math.sqrt((slot.index + .72) / (slot.total + .72)));
      const mood = artwork.moods.find(item => item.id === emotionId);
      const weightPull = 1 - (mood?.weight || .3) * .18;
      return {
        x: center.x + Math.cos(angle) * radius * weightPull + (seeded(artwork.id + "fx") - .5) * 8,
        y: center.y + Math.sin(angle) * radius * weightPull + (seeded(artwork.id + "fy") - .5) * 8
      };
    }

    function animatedArtworkPoint(artwork) {
      const from = focusTransition.from;
      const to = focusTransition.to;
      if (!from && !to) return artworkPoint(artwork);
      const elapsed = performance.now() - focusTransition.start;
      const t = Math.max(0, Math.min(1, elapsed / focusTransition.duration));
      const ease = t < .5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
      const start = from ? focusedArtworkPoint(artwork, from) : artworkPoint(artwork);
      const end = to ? focusedArtworkPoint(artwork, to) : artworkPoint(artwork);
      return {
        x: start.x + (end.x - start.x) * ease,
        y: start.y + (end.y - start.y) * ease
      };
    }

    function isFocusTransitioning() {
      if (!focusTransition.from && !focusTransition.to) return false;
      return performance.now() - focusTransition.start < focusTransition.duration;
    }

    function nodeTransform(artwork, visible = 1, elapsed = 0) {
      const point = animatedArtworkPoint(artwork);
      const intro = Math.max(0, Math.min(1, visible));
      const ease = 1 - Math.pow(1 - intro, 3);
      const phase = seeded(artwork.id + "phase") * Math.PI * 2;
      const breath = intro ? Math.sin(elapsed * .00055 + phase) : 0;
      const driftX = breath * (2.6 + seeded(artwork.id + "dx") * 2.8) * ease;
      const driftY = Math.cos(elapsed * .00048 + phase) * (2 + seeded(artwork.id + "dy") * 2.4) * ease;
      const x = graph.cx + (point.x - graph.cx) * ease + driftX;
      const y = graph.cy + (point.y - graph.cy) * ease + driftY;
      const scale = .35 + .65 * ease;
      return `translate(${x},${y}) scale(${scale})`;
    }

    function emotionPoint(emotion) {
      return {
        x: graph.cx + emotion.x * graph.rx,
        y: graph.cy - emotion.y * graph.ry
      };
    }

    function fieldRadius(emotion) {
      return Math.min(graph.rx, graph.ry) * emotion.radius;
    }

    function fieldDisplayRadius(emotion) {
      return activeEmotion === emotion.id ? focusedFieldRadius(emotion) : fieldRadius(emotion);
    }

    function focusedFieldRadius(emotion) {
      const base = fieldRadius(emotion);
      const room = Math.min(graph.rx * .92, graph.ry * .92);
      return Math.min(base * 3.35, room);
    }

    function nodeRadius(artwork) {
      return Math.max(7, Math.min(19, 6 + (artwork.fame || 5) * 1.25));
    }

    function graphMetrics() {
      if (tourMode) {
        return {
          cx: tourFocusOffsetX() * .42,
          cy: -18,
          rx: Math.max(300, width * .33),
          ry: Math.max(230, height * .34)
        };
      }
      if (width <= 1080) {
        return { cx: 0, cy: -height / 2 + 560, rx: Math.max(160, width * .42), ry: 230 };
      }
      const leftGuard = 398;
      const rightGuard = 438;
      const availableWidth = Math.max(560, width - leftGuard - rightGuard);
      const availableHeight = Math.max(560, height - 120);
      return {
        cx: -width / 2 + leftGuard + availableWidth / 2,
        cy: 8,
        rx: availableWidth * .46,
        ry: availableHeight * .42
      };
    }

    function tourFocusOffsetX() {
      return Math.min(240, Math.max(150, width * .15));
    }

    function animateTimeCanvas() {
      const canvas = document.getElementById("timeCanvas");
      const ctx = canvas.getContext("2d");
      let dpr = window.devicePixelRatio || 1;
      let stars = [];
      let bubbles = [];

      function resize() {
        dpr = window.devicePixelRatio || 1;
        canvas.width = Math.floor(window.innerWidth * dpr);
        canvas.height = Math.floor(window.innerHeight * dpr);
        canvas.style.width = `${window.innerWidth}px`;
        canvas.style.height = `${window.innerHeight}px`;
        stars = Array.from({ length: 230 }, (_, index) => ({
          x: seeded(index + "sx") * canvas.width,
          y: seeded(index + "sy") * canvas.height,
          r: .65 + seeded(index + "sr") * 1.9,
          hue: seeded(index + "sh"),
          speed: .18 + seeded(index + "ss") * .48
        }));
        bubbles = Array.from({ length: 46 }, (_, index) => ({
          x: seeded(index + "bx") * canvas.width,
          y: seeded(index + "by") * canvas.height,
          r: (5 + seeded(index + "br") * 28) * dpr,
          hue: seeded(index + "bh"),
          speed: .12 + seeded(index + "bs") * .36,
          sway: 16 + seeded(index + "bw") * 46
        }));
      }

      function frame(time) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
        gradient.addColorStop(0, "rgba(7, 11, 26, .92)");
        gradient.addColorStop(.48, "rgba(20, 11, 31, .9)");
        gradient.addColorStop(1, "rgba(4, 6, 16, .96)");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.globalCompositeOperation = "screen";
        for (let i = 0; i < 9; i++) {
          const cx = canvas.width * (.22 + i * .078) + Math.sin(time * .00013 + i) * 70 * dpr;
          const cy = canvas.height * (.24 + (i % 4) * .15) + Math.cos(time * .00011 + i) * 48 * dpr;
          const radius = (180 + i * 24) * dpr;
          const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
          glow.addColorStop(0, `rgba(${i % 3 === 0 ? "119,229,255" : i % 3 === 1 ? "255,106,155" : "241,190,98"}, .09)`);
          glow.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(cx, cy, radius, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();

        for (const star of stars) {
          const y = (star.y - time * star.speed * dpr * .018 + canvas.height * 2) % canvas.height;
          const alpha = .2 + Math.sin(time * .001 + star.x) * .12;
          ctx.fillStyle = star.hue > .72 ? `rgba(241,190,98,${alpha})` : `rgba(225,238,255,${alpha})`;
          ctx.beginPath();
          ctx.arc(star.x, y, star.r * dpr, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.save();
        ctx.globalCompositeOperation = "screen";
        for (const bubble of bubbles) {
          const y = (bubble.y - time * bubble.speed * dpr * .05 + canvas.height * 2) % canvas.height;
          const x = bubble.x + Math.sin(time * .00042 + bubble.r) * bubble.sway * dpr;
          const alpha = .08 + Math.sin(time * .0007 + bubble.x) * .025;
          ctx.strokeStyle = bubble.hue > .5 ? `rgba(241,190,98,${alpha})` : `rgba(119,229,255,${alpha})`;
          ctx.lineWidth = Math.max(1, bubble.r * .045);
          ctx.beginPath();
          ctx.arc(x, y, bubble.r, 0, Math.PI * 2);
          ctx.stroke();
          const glow = ctx.createRadialGradient(x, y, 0, x, y, bubble.r);
          glow.addColorStop(0, `rgba(255,255,255,${alpha * .18})`);
          glow.addColorStop(1, "rgba(255,255,255,0)");
          ctx.fillStyle = glow;
          ctx.fill();
        }
        ctx.restore();

        requestAnimationFrame(frame);
      }

      resize();
      window.addEventListener("resize", resize);
      requestAnimationFrame(frame);
    }

    function safeId(text) {
      return String(text).replace(/[^a-zA-Z0-9_-]/g, "-");
    }

    function escapeHtml(text) {
      return String(text || "").replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[char]));
    }

    function fileSlug(text) {
      return String(text || "artwork")
        .toLowerCase()
        .replace(/[^a-z0-9\u4e00-\u9fa5]+/g, "-")
        .replace(/^-+|-+$/g, "")
        .slice(0, 54) || "artwork";
    }

    function hexToRgba(hex, alpha) {
      const normalized = String(hex).replace("#", "");
      const value = parseInt(normalized.length === 3 ? normalized.split("").map(c => c + c).join("") : normalized, 16);
      const r = (value >> 16) & 255;
      const g = (value >> 8) & 255;
      const b = value & 255;
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function seeded(seed) {
      let hash = 2166136261;
      const str = String(seed);
      for (let i = 0; i < str.length; i++) {
        hash ^= str.charCodeAt(i);
        hash += (hash << 1) + (hash << 4) + (hash << 7) + (hash << 8) + (hash << 24);
      }
      return ((hash >>> 0) % 10000) / 10000;
    }
